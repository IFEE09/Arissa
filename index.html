  <body>
    <!-- Boot splash: evita flash del contenido antes de Vue -->
    <div id="welcome-boot" aria-hidden="true">
      <p>Bienvenido</p>
    </div>
    <style>
      html.welcome-lock,
      html.welcome-lock body {
        overflow: hidden;
      }
      #welcome-boot {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: grid;
        place-items: center;
        background: #0b0c10;
        transition: opacity 0.35s ease;
      }
      #welcome-boot p {
        margin: 0;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-weight: 500;
        font-size: clamp(2rem, 6vw, 3.5rem);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #e8e8e8;
      }
      #welcome-boot.welcome-boot--handoff {
        opacity: 0;
        pointer-events: none;
      }
    </style>
    <script>
      try {
        if (!sessionStorage.getItem('arissa-welcome-seen')) {
          document.documentElement.classList.add('welcome-lock')
        } else {
          document.getElementById('welcome-boot')?.remove()
        }
      } catch (_) {
        document.documentElement.classList.add('welcome-lock')
      }
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
